server:
  port: 8080

spring:
  application:
    name: blog-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: blog
    password: blog123
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml

jwt:
  secret: ${JWT_SECRET:blog-jwt-secret-key-2024-default-key-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000}

blog:
  upload:
    path: D:/blog/uploads/
    url: /api/upload/
